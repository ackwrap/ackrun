<%+cbi/valueheader%>
	<input id="ackwrap-generate-token" type="button" class="cbi-button cbi-button-apply" value="<%:随机生成%>" />
	<div class="cbi-value-description"><%:生成 48 位随机 Token 后，请点击“保存并应用”使服务使用新 Token。%></div>
<%+cbi/valuefooter%>
<script type="text/javascript">
(function() {
	var button = document.getElementById("ackwrap-generate-token");
	if (!button) return;
	button.addEventListener("click", function() {
		if (!window.crypto || !window.crypto.getRandomValues) {
			window.alert("<%:当前浏览器不支持安全随机数，请手动填写 Token。%>");
			return;
		}
		var bytes = new Uint8Array(24);
		window.crypto.getRandomValues(bytes);
		var token = Array.prototype.map.call(bytes, function(value) {
			return ("0" + value.toString(16)).slice(-2);
		}).join("");
		var input = document.getElementById("cbid.ackwrap.main.api_token");
		if (!input) return;
		input.value = token;
		input.dispatchEvent(new Event("change", { bubbles: true }));
		input.focus();
	});
})();
</script>
